<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VLA-Corrector Presentation</title>
    <style>
      :root {
        --bg: #f7f8fb;
        --text: #17202a;
        --muted: #5f6b7a;
        --blue: #2f5f9f;
        --line: #dbe3ee;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .viewer {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        width: 100vw;
        height: 100vh;
        min-height: 620px;
      }

      .viewer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 12px 18px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.96);
      }

      .title {
        display: grid;
        gap: 2px;
      }

      .title strong {
        font-size: 15px;
        letter-spacing: 0.01em;
      }

      .title span {
        color: var(--muted);
        font-size: 12px;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 7px 13px;
        background: #fff;
        color: var(--blue);
        font-size: 13px;
        font-weight: 800;
        text-decoration: none;
      }

      .action:hover {
        border-color: rgba(47, 95, 159, 0.45);
        background: #edf3fb;
        text-decoration: none;
      }

      .frame {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }

      .fallback {
        display: none;
        max-width: 760px;
        margin: 12vh auto 0;
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: #fff;
        text-align: center;
      }

      .fallback p {
        color: var(--muted);
      }

      @media (max-width: 720px) {
        .viewer {
          min-height: 560px;
        }

        .viewer-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .actions {
          flex-wrap: wrap;
        }
      }
    </style>
  </head>
  <body>
    <main class="viewer">
      <header class="viewer-header">
        <div class="title">
          <strong>VLA-Corrector Presentation</strong>
          <span>High-resolution PDF slide deck for the VLA-Corrector project.</span>
        </div>
        <div class="actions">
          <a class="action" href="assets/presentation/vla_corrector_presentation.pdf?v=pdf-v1">Open PDF</a>
          <a class="action" href="assets/presentation/vla_corrector_presentation.pptx?v=pdf-v1">Open PPTX</a>
          <a class="action" href="https://github.com/ZJU-OmniAI/vla-corrector">Code</a>
        </div>
      </header>

      <iframe
        class="frame"
        title="VLA-Corrector presentation"
        src="assets/presentation/vla_corrector_presentation.pdf?v=pdf-v1#view=FitH"
        allowfullscreen
      ></iframe>

      <section class="fallback">
        <h1>Presentation</h1>
        <p>
          If the embedded viewer is unavailable, open the PDF directly.
        </p>
        <a class="action" href="assets/presentation/vla_corrector_presentation.pdf?v=pdf-v1">Open PDF</a>
      </section>
    </main>
  </body>
</html>
